<section class="business-page" aria-label="Business overview">
  <header class="top-nav">
    <div class="brand-mark brand-button" (click)="goHome()" role="button" tabindex="0" aria-label="Go to home">
      <img src="assets/holonix-logo-blue.svg" alt="Holonix logo" />
      <span>Holonix</span>
    </div>

    <nav class="top-links" aria-label="Primary">
      <a routerLink="/home" routerLinkActive="top-link-active" class="top-link">Home</a>
      <a routerLink="/business" routerLinkActive="top-link-active" class="top-link">Business</a>
    </nav>

    <div class="auth-actions auth-actions-logged-in">
      <button type="button" class="profile-menu-trigger" (click)="toggleUserMenu($event)" aria-label="Open profile menu">
        <img
          *ngIf="profileImageDataUrl"
          [src]="profileImageDataUrl"
          alt="Profile picture"
          class="profile-menu-image"
        />
        <span *ngIf="!profileImageDataUrl" class="profile-menu-initials">{{ initials }}</span>
        <span class="profile-menu-name">{{ displayName }}</span>
        <span class="profile-menu-caret" aria-hidden="true">&#9662;</span>
      </button>

      <div class="user-menu" *ngIf="isUserMenuOpen">
        <button type="button" class="user-menu-item" (click)="goToProfile()">View Profile</button>
        <button type="button" class="user-menu-item danger" (click)="signOut()">Sign Out</button>
      </div>
    </div>
  </header>

  <div class="business-shell">
    <div class="business-header">
      <div class="business-header-copy">
        <p class="business-kicker">Holonix Business</p>
        <h1>Your Businesses</h1>
        <p>View the businesses you are associated with.</p>
      </div>

      <button type="button" class="create-btn" (click)="goToCreateBusiness()">Create Business</button>
    </div>

    <div class="business-state" *ngIf="loadingBusinesses">Loading businesses...</div>

    <div class="business-state" *ngIf="!loadingBusinesses && businesses.length === 0">
      No businesses yet. Create a business to get started.
    </div>

    <div class="business-grid" *ngIf="!loadingBusinesses && businesses.length > 0">
      <button type="button" class="business-card business-card-button" *ngFor="let business of businesses" (click)="openBusinessWorkspace(business)">
        <div class="business-card-top">
          <div class="business-icon" [class.business-icon-empty]="!getBusinessIconDataUrl(business.businessIconBase64)">
            <img
              *ngIf="getBusinessIconDataUrl(business.businessIconBase64)"
              [src]="getBusinessIconDataUrl(business.businessIconBase64)"
              [alt]="business.name + ' icon'"
            />
            <span *ngIf="!getBusinessIconDataUrl(business.businessIconBase64)">{{ business.name.slice(0, 1) }}</span>
          </div>

          <div class="business-title-block">
            <div class="business-badges">
              <span class="business-badge">{{ business.isProductBased ? 'Product Based' : 'Service Based' }}</span>
              <span class="business-badge business-badge-soft">{{ business.serviceCount }} categories</span>
            </div>
            <h2>{{ business.name }}</h2>
            <p>{{ getBusinessLocationLabel(business) }}</p>
          </div>
        </div>

        <p class="business-description">{{ getBusinessSummary(business) }}</p>

        <dl class="business-metrics">
          <div>
            <dt>Your Role</dt>
            <dd>{{ business.roleName || 'Team Member' }}</dd>
          </div>
          <div>
            <dt>Total Jobs Completed</dt>
            <dd>{{ business.totalJobs }}</dd>
          </div>
        </dl>
      </button>
    </div>
  </div>
</section>
