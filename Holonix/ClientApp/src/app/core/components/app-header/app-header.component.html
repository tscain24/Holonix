<header class="app-header" *ngIf="!hideHeader">
  <div class="app-header-inner">
    <div class="header-left">
      <a class="brand-mark" routerLink="/home" aria-label="Holonix Home">
        <img src="assets/holonix-logo-blue.svg" alt="Holonix logo" />
        <span>Holonix</span>
      </a>

      <nav class="top-links" aria-label="Primary" *ngIf="isLoggedIn">
        <a routerLink="/home" routerLinkActive="top-link-active" class="top-link">Home</a>
        <a routerLink="/business" routerLinkActive="top-link-active" class="top-link">Business</a>
      </nav>
    </div>

    <div class="header-center" *ngIf="!hideSearch || !hideLocation">
      <form
        class="header-omnibar"
        role="search"
        (submit)="onSearchSubmit($event)"
        autocomplete="off"
        *ngIf="!hideSearch || !hideLocation"
      >
        <div class="omnibar-segment omnibar-query" *ngIf="!hideSearch">
          <mat-icon aria-hidden="true" class="omnibar-icon">search</mat-icon>
          <input
            #headerSearchInput
            type="search"
            [(ngModel)]="searchQuery"
            name="headerSearchQuery"
            placeholder="What do you need?"
            aria-label="Search"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <button
            *ngIf="searchQuery.trim()"
            type="button"
            class="omnibar-clear"
            aria-label="Clear search"
            (click)="clearSearchQuery()"
          >
            <mat-icon aria-hidden="true">close</mat-icon>
          </button>
        </div>

        <div class="omnibar-divider" *ngIf="!hideSearch && !hideLocation" aria-hidden="true"></div>

        <div class="omnibar-segment omnibar-location header-location" *ngIf="!hideLocation" role="group" aria-label="Location">
          <mat-icon aria-hidden="true" class="omnibar-icon">location_on</mat-icon>
          <input
            #headerLocationInput
            type="text"
            name="headerLocation"
            [ngModel]="locationDisplay"
            (ngModelChange)="locationDisplay = $event"
            placeholder="Near (city, ZIP)"
            aria-label="Location"
            title=""
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            (input)="onLocationInput(headerLocationInput)"
            (keydown)="onLocationKeydown($event)"
            (focus)="openLocationDropdown(headerLocationInput)"
            (blur)="closeLocationDropdown()"
          />
          <button
            type="button"
            class="omnibar-device"
            (click)="useCurrentLocation()"
            [disabled]="resolvingDeviceLocation"
            aria-label="Use current location"
          >
            <mat-icon aria-hidden="true">{{ resolvingDeviceLocation ? 'hourglass_top' : 'my_location' }}</mat-icon>
          </button>

          <div class="header-location-dropdown" *ngIf="locationDropdownOpen">
            <div class="header-location-state" *ngIf="loadingLocationSuggestions">Searching locations...</div>
            <div class="header-location-state header-location-error" *ngIf="!loadingLocationSuggestions && locationAutocompleteError">
              {{ locationAutocompleteError }}
            </div>
            <button
              type="button"
              class="header-location-option"
              *ngFor="let suggestion of locationSuggestions; let i = index"
              [class.header-location-option-active]="highlightedLocationIndex === i"
              (mousedown)="selectLocationSuggestion(suggestion)"
            >
              {{ suggestion.fullAddress || suggestion.address1 }}
            </button>
            <div class="header-location-state" *ngIf="!loadingLocationSuggestions && !locationAutocompleteError && locationSuggestions.length === 0">
              Start typing to pick a location.
            </div>
          </div>
        </div>

        <button type="submit" class="omnibar-submit" aria-label="Search">
          <mat-icon aria-hidden="true">search</mat-icon>
        </button>
      </form>
    </div>

    <div class="header-right">
      <div class="auth-actions" *ngIf="!isLoggedIn">
        <a class="auth-link secondary" routerLink="/register">Sign up</a>
        <a class="auth-link primary" routerLink="/login">Log in</a>
      </div>

      <div class="auth-actions header-actions-logged-in" *ngIf="isLoggedIn">
        <button type="button" class="profile-menu-trigger" (click)="toggleUserMenu($event)" aria-label="Open profile menu">
          <img
            *ngIf="profileImageDataUrl"
            [src]="profileImageDataUrl"
            alt="Profile picture"
            class="profile-menu-image"
          />
          <span *ngIf="!profileImageDataUrl" class="profile-menu-initials">{{ userInitials }}</span>
          <span class="profile-menu-name">{{ displayName }}</span>
          <span class="profile-menu-caret" aria-hidden="true">&#9662;</span>
        </button>

        <div class="user-menu" *ngIf="isUserMenuOpen">
          <button type="button" class="user-menu-item" (click)="viewProfile()">View Profile</button>
          <button type="button" class="user-menu-item danger" (click)="signOut()">Sign Out</button>
        </div>
      </div>
    </div>
  </div>
</header>
